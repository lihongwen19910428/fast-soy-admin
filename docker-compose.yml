services:
  web:
    image: node:lts-slim
    working_dir: /build/web
    volumes:
      - ./web:/build/web
      - web_node_modules:/build/web/node_modules
    command: >
      sh -c "
        corepack enable &&
        corepack prepare pnpm@latest --activate &&
        pnpm install --frozen-lockfile &&
        NODE_OPTIONS=--max_old_space_size=4096 pnpm run build
      "

  nginx:
    image: nginx:latest
    ports:
      - "1880:80"
    volumes:
      - ./web/dist:/var/www/html/fast-soy-admin:ro
      - ./deploy/web.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      web:
        condition: service_completed_successfully
      app:
        condition: service_started
    restart: always
    networks:
      - internal

  app:
    image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
    working_dir: /opt/fast-soy-admin
    command: >
      sh -c "
        uv sync --frozen --no-dev --no-install-project &&
        uv run run.py
      "
    environment:
      - LANG=zh_CN.UTF-8
    volumes:
      - .:/opt/fast-soy-admin
    depends_on:
      - redis
    restart: always
    networks:
      - internal

  redis:
    image: redis:latest
    networks:
      - internal
    volumes:
      - redis_data:/data

  # Optional: run with `docker compose --profile cron up -d`
  cron_reset:
    image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
    working_dir: /opt/fast-soy-admin
    command: >
      sh -c "
        uv sync --frozen --no-dev --no-install-project &&
        uv run cron_reset.py
      "
    environment:
      - LANG=zh_CN.UTF-8
    volumes:
      - .:/opt/fast-soy-admin
    depends_on:
      - app
    restart: unless-stopped
    profiles:
      - cron
    networks:
      - internal

volumes:
  web_node_modules:
  redis_data:

networks:
  internal:
    driver: bridge
