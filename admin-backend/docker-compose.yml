services:
  nginx:
    build:
      context: .
      dockerfile: deploy/web.Dockerfile
    ports:
      - "1880:80"
    depends_on:
      app:
        condition: service_started
    restart: always
    networks:
      - internal

  app:
    build:
      context: .
      dockerfile: deploy/app.Dockerfile
    depends_on:
      - redis
    restart: always
    networks:
      - internal

  redis:
    image: redis:latest
    networks:
      - internal
    volumes:
      - redis_data:/data

  # Optional: run with `docker compose --profile cron up -d`
  # View logs: `docker compose --profile cron logs -f cron_reset`
  cron_reset:
    build:
      context: .
      dockerfile: deploy/app.Dockerfile
    command: ["uv", "run", "cron_reset.py"]
    depends_on:
      - app
    restart: unless-stopped
    profiles:
      - cron
    networks:
      - internal

volumes:
  redis_data:

networks:
  internal:
    driver: bridge
